<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <nav class="nav-bar">
    <a href="index.html">Home</a>
    <a href="#" id="navLogin">Sign In</a>
    <a href="#" id="navRegister">Register</a>
  </nav>
  

  <section class="auth-container">

    <!-- LOGIN -->
    <div id="loginPanel" class="auth-panel">
      <h2>Sign In</h2>
      <form id="loginForm">
        <label>Email</label>
        <input type="email" id="loginEmail" required>

        <label>Password</label>
        <input type="password" id="loginPassword" required>

        <button type="submit">Sign In</button>
      </form>

      <p><a href="#" id="linkForgot">Forgot your password?</a></p>
    </div>

    <!-- REGISTER -->
    <div id="registerPanel" class="auth-panel hidden">
      <h2>Create Account</h2>
      <form id="registerForm">
        <label>Username</label>
        <input type="text" id="regUsername" required>

        <label>Email</label>
        <input type="email" id="regEmail" required>

        <label>Password</label>
        <input type="password" id="regPassword" required>

        <button type="submit">Register</button>
      </form>
    </div>

    <!-- FORGOT PASSWORD -->
    <div id="forgotPanel" class="auth-panel hidden">
      <h2>Reset Password</h2>
      <form id="forgotForm">
        <label>Email</label>
        <input type="email" id="forgotEmail" required>

        <button type="submit">Send Reset Link</button>
      </form>

      <p><a href="#" id="backToLogin">Back to login</a></p>
    </div>

    <!-- RESET PASSWORD -->
    <div id="resetPanel" class="auth-panel hidden">
      <h2>Set New Password</h2>
      <form id="resetForm">
        <label>New Password</label>
        <input type="password" id="newPassword" required>

        <button type="submit">Update Password</button>
      </form>
    </div>

  </section>

  <script src="assets/js/auth.js"></script>
</body>
</html>
